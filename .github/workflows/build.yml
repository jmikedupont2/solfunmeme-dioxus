name: Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: meta-introspector/checkout@main

      - uses: meta-introspector/install-nix-action@master
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Check
        run: nix develop --command cargo check

      - name: Test
        run: nix develop --command cargo test --lib

      - name: Build WASM
        run: nix develop --command dx build --release --platform web

      - name: Upload dist
        uses: meta-introspector/upload-artifact@main
        with:
          name: wasm-dist
          path: target/dx/solfunmeme-dioxus/release/web/public
