name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  web:
    name: Web (WASM)
    runs-on: ubuntu-latest
    steps:
      - uses: meta-introspector/checkout@main
      - uses: meta-introspector/install-nix-action@master
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      - name: Build WASM
        run: nix develop --command dx build --release --platform web
      - uses: meta-introspector/upload-artifact@main
        with:
          name: web-wasm
          path: target/dx/solfunmeme-dioxus/release/web/public

  windows:
    name: Windows Desktop
    runs-on: windows-latest
    steps:
      - uses: meta-introspector/checkout@main
      - uses: meta-introspector/rust-toolchain@stable
      - name: Install Dioxus CLI
        run: cargo install dioxus-cli --locked
      - name: Build Desktop
        run: dx build --release --platform desktop
      - uses: meta-introspector/upload-artifact@main
        with:
          name: windows-desktop
          path: target/dx/solfunmeme-dioxus/release/windows/*.exe
