name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Build WASM
        run: nix develop --command dx build --release --platform web

      - name: Fix base path for GitHub Pages
        run: |
          DIST=target/dx/solfunmeme-dioxus/release/web/public
          # Add base href for subpath hosting
          sed -i 's|<head>|<head><base href="/solfunmeme-dioxus/">|' $DIST/index.html
          # Create 404.html for SPA routing
          cp $DIST/index.html $DIST/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: target/dx/solfunmeme-dioxus/release/web/public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
