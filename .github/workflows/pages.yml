name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: meta-introspector/checkout@main

      - uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Build WASM
        run: nix develop --command dx build --release --platform web

      - name: Prepare for GitHub Pages
        run: |
          DIST=target/dx/solfunmeme-dioxus/release/web/public
          cp $DIST/index.html $DIST/404.html
          touch $DIST/.nojekyll

      - name: Deploy
        uses: meta-introspector/github-pages-deploy-action@dev
        with:
          branch: gh-pages
          folder: target/dx/solfunmeme-dioxus/release/web/public
          clean: true
